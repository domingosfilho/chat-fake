<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WhatsApp Fake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<body>


<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">Chats</div>

        <div class="search">
            <input placeholder="Pesquisar ou começar uma nova conversa">
        </div>

        <div class="contatos"></div>
    </div>

    <!-- CHAT -->
    <div class="chat">

<div class="chat-header">
    <img id="foto">
    <div>
        <div class="nome"></div>
        <div class="status">online</div>
    </div>
</div>

        <div class="chat-body"></div>

        <div class="chat-footer">
            <span>😊</span>
            <input id="inputMsg" placeholder="Digite uma mensagem">
            <span>📎</span>
            <span>🎤</span>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
